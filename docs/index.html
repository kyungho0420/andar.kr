<body>
    <!-- Nav -->
    <nav class="nav">
        <div class="nav__container">
            <a href="#home" class="nav__logo" data-lang="home_title">ANDAR</a>
            <div class="nav__buttons">

    <!-- Header -->

    <main>

        <section id="overview" class="section">

                <h2>
                    <span translate="no" class="material-symbols-outlined notranslate">spa</span>
                    <span data-lang="overview_title">소개</span>
                </h2>
                <p class="section__description" data-lang="overview_desc"></p>
                <div class="grid grid--cols-2">
                    <div class="card">
                        <div class="card__content">
                            <h3 class="card__title" data-lang="overview_01_title"></h3>
                            <p class="card__description" data-lang="overview_01_desc"></p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card__content">

                            <p class="card__description" data-lang="overview_02_desc"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>


        <section id="services" class="section">
            <div class="container js-fade-in">
                <h2><span translate="no" class="material-symbols-outlined notranslate">self_improvement</span><span
                        data-lang="services_title"></span></h2>
                <p class="section__description" data-lang="services_desc"></p>

                <div class="grid grid--cols-3">

                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/services/01.jpg"
                                alt="Service 01" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="services_01_title"></h3>
                            <p class="card__description" data-lang="services_01_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="services_01_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_01_price_1_label"></span>
                                <span class="price-info__value" data-lang="services_01_price_1_value"></span>
                            </div>
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_01_price_2_label"></span>
                                <span class="price-info__value" data-lang="services_01_price_2_value"></span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/services/02.jpg"
                                alt="Service 02" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="services_02_title"></h3>
                            <p class="card__description" data-lang="services_02_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="services_02_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_02_price_1_label"></span>
                                <span class="price-info__value" data-lang="services_02_price_1_value"></span>
                            </div>
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_02_price_2_label"></span>
                                <span class="price-info__value" data-lang="services_02_price_2_value"></span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/services/03.jpg"
                                alt="Service 03" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="services_03_title"></h3>
                            <p class="card__description" data-lang="services_03_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="services_03_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_03_price_1_label"></span>
                                <span class="price-info__value" data-lang="services_03_price_1_value"></span>
                            </div>
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="services_03_price_2_label"></span>
                                <span class="price-info__value" data-lang="services_03_price_2_value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="faq-container">
                    <h3 class="faq-title" data-lang="faq_title">FAQ</h3>
                    <div class="faq-list" data-content-type="faq" data-prefix="services_faq_item"
                        data-dynamic-area>
                    </div>
                </div>
            </div>
        </section>


        <section id="products" class="section">
            <div class="container js-fade-in">
                <h2><span translate="no" class="material-symbols-outlined notranslate">soap</span><span
                        data-lang="products_title"></span></h2>
                <p class="section__description" data-lang="products_desc"></p>

                <div class="grid grid--cols-3">
                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/products/01.jpg"
                                alt="Product 01" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="products_01_title"></h3>
                            <p class="card__description" data-lang="products_01_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="products_01_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="products_01_price_1_label"></span>
                                <span class="price-info__value" data-lang="products_01_price_1_value"></span>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/products/02.jpg"
                                alt="Product 02" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="products_02_title"></h3>
                            <p class="card__description" data-lang="products_02_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="products_02_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="products_02_price_1_label"></span>
                                <span class="price-info__value" data-lang="products_02_price_1_value"></span>
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger"><img src="./section/products/03.jpg"
                                alt="Product 03" class="card__image"></div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="products_03_title"></h3>
                            <p class="card__description" data-lang="products_03_desc"></p>
                            <div class="product-list" data-content-type="product" data-prefix="products_03_detail"
                                data-dynamic-area></div>
                        </div>
                        <div class="price-info">
                            <div class="price-info__item">
                                <span class="price-info__label" data-lang="products_03_price_1_label"></span>
                                <span class="price-info__value" data-lang="products_03_price_1_value"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="faq-container">
                    <h3 class="faq-title" data-lang="faq_title">FAQ</h3>
                    <div class="faq-list" data-content-type="faq" data-prefix="products_faq_item"
                        data-dynamic-area>
                    </div>
                </div>
            </div>
        </section>


        <section id="promotion" class="section">
            <div class="section--parallax dotted andar-promotion-bg">
            </div>
            <div class="container js-fade-in">
                <div class="grid grid--cols-1">
                    <div class="card card--horizontal">
                        <div class="card__image-wrapper">
                            <img src="./section/promotion/01.jpg" alt="Promotion" class="card__image">
                        </div>
                        <div class="card__content">
                            <span class="card__tag" data-lang="promotion_tag_discount"></span>
                            <h3 class="card__title" data-lang="promotion_01_title"></h3>
                            <p class="card__description" data-lang="promotion_01_desc"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>


        <section id="interviews" class="section">
            <div class="container js-fade-in">
                <h2><span translate="no" class="material-symbols-outlined notranslate">format_quote</span><span
                        data-lang="interviews_title"></span></h2>
                <p class="section__description" data-lang="interviews_desc"></p>

                <!-- CEO Interview (Full Width, Standard Card) -->
                <div class="grid grid--cols-1 andar-interview-grid">
                    <div class="card">
                        <!-- Video without wrapper for full control or consistent height -->
                        <div class="card__image-wrapper andar-video-wrapper">
                            <video class="card__video andar-video" controls poster="./section/interviews/ceo.jpg">
                                <source src="./section/interviews/ceo.mp4" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                        </div>
                    </div>
                </div>

                <!-- Client Interviews (2 Columns) -->
                <div class="grid grid--cols-2">
                    <!-- Client 01 -->
                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger">
                            <span class="card__tag card__tag--overlay" data-lang="interview_01_job"></span>
                            <img src="./section/interviews/01.jpg" alt="Interviewee 01" class="card__image">
                        </div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="interview_01_name"></h3>
                            <audio controls>
                                <source src="./section/interviews/01.mp4" type="audio/mp4">
                            </audio>
                            <p class="card__description card__comment" data-lang="interview_01_script"></p>
                        </div>
                    </div>

                    <!-- Client 02 -->
                    <div class="card">
                        <div class="card__image-wrapper js-lightbox-trigger">
                            <span class="card__tag card__tag--overlay" data-lang="interview_02_job"></span>
                            <img src="./section/interviews/02.jpg" alt="Interviewee 02" class="card__image">
                        </div>
                        <div class="card__content">
                            <h3 class="card__title" data-lang="interview_02_name"></h3>
                            <audio controls>
                                <source src="./section/interviews/02.mp4" type="audio/mp4">
                            </audio>
                            <p class="card__description card__comment" data-lang="interview_02_script"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>


        <section id="location" class="section">
            <div class="container js-fade-in">
                <h2><span translate="no" class="material-symbols-outlined notranslate">location_on</span><span
                        data-lang="section_location_title"></span></h2>
                <p class="section__description" data-lang="section_location_desc_reservation"></p>
                <div class="card">
                    <!-- Google Map Embed Placeholder -->
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3305.689154412275!2d-118.2562447889396!3d34.05199927304996!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80c2c64848905333%3A0x4549452dfa14a635!2sU.S.%20Bank%20Tower!5e0!3m2!1sko!2skr!4v1719957863588!5m2!1sko!2skr"
                        class="card__map" allowfullscreen=""
                        loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="address-block">
                    <p data-lang="address_text"></p>
                </div>
            </div>
        </section>


        <section id="profile" class="section">
            <div class="container js-fade-in">
                <h2><span translate="no" class="material-symbols-outlined notranslate">contact_mail</span><span
                        data-lang="section_profile_title"></span></h2>
                <p class="section__description" data-lang="section_profile_desc"></p>

                <div class="profile-list">
                    <div class="profile-list__item">
                        <strong class="profile-list__label" data-lang="form_label_name"></strong>
                        <span class="profile-list__value" data-lang="rep_name"></span>
                    </div>
                    <div class="profile-list__item">
                        <strong class="profile-list__label" data-lang="form_label_email"></strong>
                        <a href="mailto:andar@example.com" class="profile-list__value" data-lang="email_address"
                            data-lang-href="email_href"></a>
                    </div>
                    <div class="profile-list__item">
                        <strong class="profile-list__label" data-lang="sns_label_instagram"></strong>
                        <a href="#" class="profile-list__value" data-demo-link="true">@andar_official</a>
                    </div>
                    <div class="profile-list__item">
                        <strong class="profile-list__label" data-lang="sns_label_youtube"></strong>
                        <a href="#" class="profile-list__value" data-demo-link="true">ANDAR TV</a>
                    </div>
                </div>
                <div class="button-group">
                    <a href="#" class="btn" data-lang-href="profile_button_url" rel="noopener noreferrer">
                        <span data-lang="btn_reservation"></span>
                    </a>
                </div>

            </div>
        </section>

        <!-- Contact -->
        <section id="contact" class="section">
            <div class="container js-fade-in">
                <h2>
                    <span translate="no" class="material-symbols-outlined notranslate">mail</span>
                    <span data-lang="section_contact_title"></span>
                </h2>
                <p class="section__description" data-lang="section_contact_desc"></p>

                <form class="form contact-form" autocomplete="off" data-intent="conn.contact">
                    <input type="email" name="email" required class="form__input"
                        data-lang-placeholder="form_placeholder_email" placeholder="Email">
                    <div class="form__textarea-wrapper">
                        <textarea name="message" rows="5" required maxlength="5000" class="form__textarea"
                            data-lang-placeholder="form_placeholder_msg" placeholder="Message"></textarea>
                    </div>
                    <input type="hidden" name="form" value="andar">
                    
                    <!-- Turnstile -->
                    <div id="turnstile-container"></div>
                    
                    <button type="submit" class="btn">
                        <span class="form__text" data-lang="btn_submit">보내기</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Search -->
        <section id="search" class="section">
            <div class="container js-fade-in">
                <h2>
                    <span translate="no" class="material-symbols-outlined notranslate">search</span>
                    <span data-lang="section_search_title"></span>
                </h2>
                <p class="section__description" data-lang="section_search_desc"></p>

                <form class="form search-form" autocomplete="off" data-intent="conn.search">
                    <input type="text" name="key" required class="form__input"
                        data-lang-placeholder="form_placeholder_search" placeholder="Search...">
                    <input type="hidden" name="form" value="andar">
                    <button type="submit" class="btn">
                        <span class="form__text" data-lang="btn_search">검색</span>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="render-as-html" data-lang="ui_copyright_text"></p>
            <p><a data-lang-href="ui_footer_credit_url" rel="noopener noreferrer"
                    data-lang="ui_footer_credit_text">Powered by Damso</a></p>
        </div>
    </footer>

    <!-- To Top Button -->
    <a href="#home" id="to-top-btn" class="hidden">
        <span translate="no" class="material-symbols-outlined notranslate">arrow_upward</span>
    </a>
