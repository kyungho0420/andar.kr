<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title data-i18n="home_title">Andar Aroma Spa</title>

    <meta property="og:image" content="https://www.andar.kr/section/home/1.jpg">
    <link rel="icon" href="https://www.andar.kr/images/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- [Tier 1] Damso Core -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/core/core.css">
    <script src="https://dev.dam.so/_inc/ex/v4/core/core.js"></script>

    <!-- [Tier 2] Damso View: Form -->
    <link rel="stylesheet" href="https://dev.dam.so/_inc/ex/v4/view/form.css">
    <script src="https://dev.dam.so/_inc/ex/v4/view/form.js"></script>

    <!-- [Tier 3] User Custom -->
    <link rel="stylesheet" href="./lay.css">
    <script src="./lay.js" defer></script>
</head>

<body>
    <div class="damso-app">
        <div class="damso-container">
            <form id="application-form" class="damso-form" autocomplete="off" data-intent="conn.reservation">
                <input type="hidden" name="form" value="">

                <!-- 1. Applicant Info -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="applicant_info_title"></h2>
                    </div>

                    <div class="damso-group">
                        <label class="damso-label" for="name" data-i18n="applicant_name"></label>
                        <input class="damso-input" id="name" name="name" type="text" required>
                    </div>
                    <div class="damso-group">
                        <label class="damso-label" for="phone" data-i18n="applicant_contact"></label>
                        <input class="damso-input" id="phone" name="phone" type="tel" required>
                    </div>
                    <div class="damso-group">
                        <label class="damso-label" for="email" data-i18n="form_label_email">이메일</label>
                        <input class="damso-input" id="email" name="email" type="email" required>
                    </div>

                    <!-- Gender & Birth -->
                    <div class="site-row-datetime">
                        <div class="damso-group">
                            <label class="damso-label" data-i18n="applicant_gender">성별</label>
                            <div class="site-segmented-control">
                                <input type="radio" id="app_gen_m" name="applicant_gender" value="M" checked>
                                <label for="app_gen_m" data-i18n="label_male">남</label>

                                <input type="radio" id="app_gen_f" name="applicant_gender" value="F">
                                <label for="app_gen_f" data-i18n="label_female">여</label>
                            </div>
                        </div>

                        <div class="damso-group">
                            <label class="damso-label" data-i18n="applicant_birth">출생년도</label>
                            <select class="damso-select js-birth-year" name="applicant_birth_year">
                                <!-- Options populated by lay.js -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 2. Visitor Info -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="visitor_info_title"></h2>
                    </div>

                    <div class="damso-group">
                        <label class="damso-label" data-i18n="visitor_count"></label>
                        <div class="site-segmented-control">
                            <input type="radio" id="visitor_count_1" name="visitor_count" value="1" checked>
                            <label for="visitor_count_1" data-i18n="visitor_count_one"></label>

                            <input type="radio" id="visitor_count_2" name="visitor_count" value="2">
                            <label for="visitor_count_2" data-i18n="visitor_count_two"></label>

                            <input type="radio" id="visitor_count_3" name="visitor_count" value="3">
                            <label for="visitor_count_3" data-i18n="visitor_count_three"></label>
                        </div>
                        <p class="damso-note" data-i18n="visitor_note"></p>
                    </div>

                    <div id="visitor-details-container"></div>
                </div>

                <!-- 3. Service Selection -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="service_selection_title"></h2>
                    </div>

                    <p class="damso-note" style="margin-top:-0.5rem; margin-bottom:1.5rem;" data-i18n="services_desc"></p>

                    <div class="damso-group">
                        <label class="damso-label" data-i18n="program"></label>
                        <select name="service" id="service" class="damso-select" required>
                            <option value="" data-i18n="program_select"></option>
                            <option value="aroma_signature" data-i18n="services_01_title"></option>
                            <option value="deep_tissue" data-i18n="services_02_title"></option>
                            <option value="serenity_facial" data-i18n="services_03_title"></option>
                        </select>
                    </div>

                    <div class="damso-group">
                        <label class="damso-label" data-i18n="reservation_datetime"></label>
                        <div class="site-row-datetime">
                            <div class="date-time-wrapper">
                                <input class="damso-input" id="reservation_date" name="reservation_date" type="date"
                                    required>
                            </div>
                            <select class="damso-select" id="reservation_hour" name="reservation_hour" required>
                                <option value="10:00">10:00</option>
                                <option value="11:00">11:00</option>
                                <option value="12:00">12:00</option>
                                <option value="13:00">13:00</option>
                                <option value="14:00">14:00</option>
                                <option value="15:00">15:00</option>
                                <option value="16:00">16:00</option>
                                <option value="17:00">17:00</option>
                                <option value="18:00">18:00</option>
                                <option value="19:00">19:00</option>
                                <option value="20:00">20:00</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 4. Additional Requests -->
                <div class="damso-card">
                    <div class="damso-card__header">
                        <h2 data-i18n="additional_requests_title"></h2>
                    </div>
                    <div class="damso-group">
                        <textarea class="damso-textarea" name="requests" rows="5"></textarea>
                    </div>
                </div>

                <!-- Submit -->
                <div class="damso-submit-area">
                    <button type="submit" class="damso-btn damso-btn--submit damso-btn--full" id="submit-btn">
                        <span class="submit-btn-text" data-i18n="submit_button"></span>
                    </button>
                </div>
            </form>

        </div>
    </div>

</body>

</html>
